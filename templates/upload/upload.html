{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header">

            Upload Log File

        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">

                        Log Type

                    </label>

                    <select
                        class="form-select"
                        name="log_type">

                        <option>Windows</option>

                        <option>Linux</option>

                        <option>Firewall</option>

                        <option>Apache</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Choose CSV File

                    </label>

                    <input
                        type="file"
                        class="form-control"
                        name="logfile"
                        accept=".csv"
                        required>

                </div>

                <button
                    class="btn btn-primary">

                    Upload

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
