{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center mb-4">

Login

</h2>

<form method="POST">

<div class="mb-3">

<label>Username</label>

<input
type="text"
class="form-control"
name="username"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
class="form-control"
name="password"
required>

</div>

<button
class="btn btn-success w-100">

Login

</button>

</form>

</div>

</div>

</div>

{% endblock %}
