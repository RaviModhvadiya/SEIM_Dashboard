{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-12 col-md-6">
        <div class="card shadow-lg">
            <div class="card-body p-4">

            <h2 class="text-center mb-4">

                User Registration

            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label>Full Name</label>

                    <input
                        type="text"
                        name="full_name"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label>Username</label>

                    <input
                        type="text"
                        name="username"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label>Password</label>

                    <input
                        type="password"
                        name="password"
                        class="form-control"
                        required>

                </div>

                <button class="btn btn-primary w-100">Register</button>

            </form>

            </div>
        </div>
    </div>
</div>

{% endblock %}
